system:
  orchestrator_llm: "claude-3-7-sonnet"   # default LLM for orchestration
  fallback_llm: "gpt-4o"
  port: 8000

enabled_modules:
  customer_support: true
  repo_maintainer: false
  doc_analyst: true
  fintech_auditor: false
  omni_onboarder: true

integrations:
  stripe_key_env: "STRIPE_SECRET_KEY"
  github_token_env: "GITHUB_TOKEN"
  vector_db: "chroma"
  openai_api_key_env: "OPENAI_API_KEY"
  anthropic_api_key_env: "ANTHROPIC_API_KEY"
