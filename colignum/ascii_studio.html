<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLIGNUM · ASCII STUDIO · BETA TEST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ----- PURE BLACK & WHITE STYLING ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
            border: 2px solid #ffffff;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        body.ui-invert {
            background: #ffffff;
            color: #000000;
            border-color: #000000;
        }

        body.ui-invert .top-bar,
        body.ui-invert .left-panel,
        body.ui-invert .right-panel,
        body.ui-invert .preview-container,
        body.ui-invert select,
        body.ui-invert button,
        body.ui-invert textarea,
        body.ui-invert .shader-editor label {
            background-color: #ffffff;
            color: #000000;
            border-color: #000000;
        }

        body.ui-invert .slider-item input {
            accent-color: #000000;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 6px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000000;
            padding: 6px 12px;
            border: 1px solid #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo {
            font-size: 1.2rem;
            text-decoration: none;
        }

        .top-buttons {
            display: flex;
            gap: 10px;
        }

        .top-buttons button {
            background: #000000;
            border: 1px solid #ffffff;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .top-buttons button:hover {
            background: #333333;
        }

        .main-area {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 6px;
            flex: 1;
            min-height: 0;
        }

        .left-panel {
            background: #000000;
            border: 1px solid #ffffff;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .right-panel {
            background: #000000;
            border: 1px solid #ffffff;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .panel-section {
            border-bottom: 1px solid #ffffff;
            padding-bottom: 10px;
        }

        .panel-section h3 {
            margin-bottom: 8px;
            font-size: 1.1rem;
            text-decoration: underline overline;
        }

        .slider-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .slider-item label {
            width: 80px;
        }

        .slider-item input {
            width: 180px;
            background: #000000;
            border: 1px solid #ffffff;
            accent-color: #ffffff;
            cursor: pointer;
        }

        .slider-item span {
            width: 45px;
            text-align: right;
        }

        select, button {
            background: #000000;
            border: 1px solid #ffffff;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 6px 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }

        .shader-editor {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .shader-editor label {
            background: #000000;
            padding: 2px 8px;
            border: 1px solid #ffffff;
            border-bottom: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        .shader-editor textarea {
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.3;
            resize: vertical;
            height: 120px;
        }

        .compile-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0;
        }

        .ascii-editor textarea {
            width: 100%;
            height: 150px;
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
            resize: vertical;
            white-space: pre;
            overflow: auto;
        }

        .preview-container {
            background: #000000;
            border: 1px solid #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 10px;
        }

        #ascii-output {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.2;
            white-space: pre;
            color: #ffffff;
            background: #000000;
            margin: auto;
            width: fit-content;
        }

        #record-status {
            color: #ff5555;
            font-weight: bold;
            text-align: right;
            padding-right: 10px;
        }

        .overlay-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }
        .overlay-toggle input {
            width: 20px;
            height: 20px;
            accent-color: #ffffff;
        }

        @media (max-width: 900px) {
            .main-area {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="logo">COLIGNUM · ASCII STUDIO · BETA TEST</div>
        <div class="top-buttons">
            <button id="fullscreen-btn">FULLSCREEN</button>
            <button id="ui-invert-btn">UI INVERT</button>
            <button id="export-png">PNG (4K GLOW)</button>
            <button id="export-mp4">MP4 (4K · 10s GLOW)</button>
        </div>
    </div>

    <div class="main-area">
        <!-- LEFT PANEL: GLOW SOURCE (GLSL + shape controls) -->
        <div class="left-panel">
            <div class="panel-section">
                <h3>GEOMETRY</h3>
                <div class="slider-item">
                    <label>TYPE</label>
                    <select id="geometry-type">
                        <option value="sphere" selected>SPHERE</option>
                        <option value="cube">CUBE</option>
                        <option value="torus">TORUS</option>
                        <option value="icosahedron">ICOSAHEDRON</option>
                    </select>
                </div>
                <div class="slider-item">
                    <label>SIZE</label>
                    <input type="range" id="uSize" min="0.1" max="2.0" step="0.01" value="1.0">
                    <span id="size-val">1.00</span>
                </div>
                <div class="slider-item">
                    <label>DETAIL</label>
                    <input type="range" id="detail" min="1" max="64" step="1" value="32">
                    <span id="detail-val">32</span>
                </div>
            </div>

            <div class="panel-section">
                <h3>WAVE / SPEED</h3>
                <div class="slider-item">
                    <label>WAVE</label>
                    <input type="range" id="uWave" min="0.0" max="5.0" step="0.05" value="2.0">
                    <span id="wave-val">2.00</span>
                </div>
                <div class="slider-item">
                    <label>SPEED</label>
                    <input type="range" id="uSpeed" min="0.0" max="2.0" step="0.05" value="0.8">
                    <span id="speed-val">0.80</span>
                </div>
            </div>

            <div class="panel-section">
                <h3>GLSL SOURCE</h3>
                <div class="slider-item">
                    <label>AMPLITUDE</label>
                    <input type="range" id="uAmp" min="0.0" max="2.0" step="0.01" value="0.3">
                    <span id="amp-val">0.30</span>
                </div>
                <div class="slider-item">
                    <label>FREQUENCY</label>
                    <input type="range" id="uFreq" min="0.1" max="5.0" step="0.05" value="2.0">
                    <span id="freq-val">2.00</span>
                </div>
                <div class="slider-item">
                    <label>DISTORTION</label>
                    <input type="range" id="uDistort" min="0.0" max="1.0" step="0.01" value="0.2">
                    <span id="distort-val">0.20</span>
                </div>
                <div class="slider-item">
                    <label>GLITCH</label>
                    <input type="range" id="uGlitch" min="0.0" max="1.0" step="0.01" value="0.1">
                    <span id="glitch-val">0.10</span>
                </div>
            </div>

            <!-- Shader editors -->
            <div class="shader-editor">
                <label>VERTEX SHADER</label>
                <textarea id="vertex-shader" spellcheck="false">
//COLIGNUM VERTEXSHADER
uniform float uTime;
uniform float uSize;
uniform float uWave;
uniform float uSpeed;
uniform float uAmp;
uniform float uFreq;
uniform float uDistort;
uniform float uGlitch;

varying vec3 vPosition;
varying vec3 vNormal;
varying float vBrightness;

float loopTime(float t){
    return mod(t, 4.0);
}

void main(){
    float t = loopTime(uTime * uSpeed);
    vec3 pos = position * uSize;

    pos.y += sin(pos.x * uWave * uFreq + t * 2.0) * uAmp;
    pos.x += cos(pos.z * uWave * uFreq + t) * uAmp * 0.5;
    
    float d = length(pos);
    pos.x += sin(d * 3.0 + t) * uDistort;
    pos.y += cos(d * 2.0 - t) * uDistort;

    if (uGlitch > 0.1) {
        float g = sin(pos.y * 20.0 + t * 10.0) * uGlitch;
        pos.x += g;
        pos.z += g;
    }

    vPosition = pos;
    vNormal = normal;
    vBrightness = 0.6 + 0.4 * sin(pos.x * 1.5 + pos.y * 1.2 + t * 3.0 + uGlitch * 5.0);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}
                </textarea>
            </div>
            <div class="shader-editor">
                <label>FRAGMENT SHADER</label>
                <textarea id="fragment-shader" spellcheck="false">
//COLIGNUM FRAGMENTSHADER
uniform float uTime;
uniform float uGlitch;
uniform float uAmp;
varying vec3 vNormal;
varying float vBrightness;

void main(){
    float n = sin(vNormal.x * 10.0 + uTime * 5.0) * uGlitch;
    float val = clamp(vBrightness + n * 0.5, 0.0, 1.0);
    gl_FragColor = vec4(vec3(val), 1.0);
}
                </textarea>
            </div>
            <div class="compile-bar">
                <button id="compile-btn">⚙ COMPILE</button>
                <span id="compile-status">ready</span>
            </div>

            <!-- GLOW PARAMETERS -->
            <div class="panel-section">
                <h3>GLOW EFFECT</h3>
                <div class="slider-item">
                    <label>INTENSITY</label>
                    <input type="range" id="glowIntensity" min="0.0" max="2.0" step="0.01" value="0.8">
                    <span id="glow-intensity-val">0.80</span>
                </div>
                <div class="slider-item">
                    <label>RADIUS</label>
                    <input type="range" id="glowRadius" min="0.0" max="10.0" step="0.1" value="3.0">
                    <span id="glow-radius-val">3.0</span>
                </div>
                <div class="slider-item">
                    <label>INVERT</label>
                    <select id="glowInvert">
                        <option value="0" selected>OFF</option>
                        <option value="1">ON</option>
                    </select>
                </div>
            </div>

            <div class="panel-section">
                <h3>PLAYBACK</h3>
                <div class="button-group">
                    <button id="play-pause">⏸ PAUSE</button>
                </div>
            </div>
        </div>

        <!-- CENTER: ASCII preview (shape + optional text overlay) -->
        <div class="preview-container">
            <pre id="ascii-output">... initializing shaders ...</pre>
        </div>

        <!-- RIGHT PANEL: ASCII CUSTOM TEXT + OVERLAY CONTROL -->
        <div class="right-panel">
            <div class="panel-section ascii-editor">
                <h3>CUSTOM TEXT (OVERLAY)</h3>
                <textarea id="custom-ascii" spellcheck="false" placeholder="Type your own ASCII art here... (spaces are transparent)"></textarea>
                <div class="overlay-toggle">
                    <input type="checkbox" id="overlay-enable">
                    <label for="overlay-enable">🔲 OVERLAY TEXT ON SHAPE</label>
                </div>
                <button id="apply-custom" style="width:100%;">UPDATE OVERLAY</button>
            </div>

            <div class="panel-section">
                <h3>ASCII GENERATION</h3>
                <div class="slider-item">
                    <label>CONTRAST</label>
                    <input type="range" id="asciiContrast" min="0.5" max="2.5" step="0.05" value="1.0">
                    <span id="contrast-val">1.00</span>
                </div>
                <div class="slider-item">
                    <label>BRIGHTNESS</label>
                    <input type="range" id="asciiBrightness" min="-0.5" max="0.5" step="0.01" value="0.0">
                    <span id="brightness-val">0.00</span>
                </div>
                <div class="slider-item">
                    <label>DENSITY</label>
                    <input type="range" id="asciiDensity" min="2" max="16" step="1" value="10">
                    <span id="density-val">10</span>
                </div>
                <div class="slider-item">
                    <label>CHARSET</label>
                    <select id="charset">
                        <option value="standard" selected>STANDARD</option>
                        <option value="blocky">BLOCKY</option>
                        <option value="detailed">DETAILED</option>
                    </select>
                </div>
                <div class="button-group">
                    <button id="ascii-invert-btn">INVERT ASCII</button>
                </div>
            </div>
        </div>
    </div>

    <div id="record-status"></div>
</div>

<script>
    (function() {
        // --- Configuration ---
        const ASCII_COLS = 120;
        const ASCII_ROWS = 40;
        const LOW_RES_W = ASCII_COLS;
        const LOW_RES_H = ASCII_ROWS;
        const HIGH_RES_W = 3840;
        const HIGH_RES_H = 1280;

        // ASCII ramps
        const charsets = {
            standard: " .:-=+*#%@",
            blocky: " ░▒▓█",
            detailed: " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$"
        };
        let currentRamp = charsets.standard;
        let invertAscii = false;
        let asciiContrast = 1.0;
        let asciiBrightness = 0.0;
        let asciiDensity = 10;
        let customAsciiText = '';
        let overlayEnabled = false;

        // Glow parameters
        let glowIntensity = 0.8;
        let glowRadius = 3.0;
        let glowInvert = false;

        // DOM elements
        const asciiOutput = document.getElementById('ascii-output');
        const customAsciiTextarea = document.getElementById('custom-ascii');
        const applyCustomBtn = document.getElementById('apply-custom');
        const overlayCheckbox = document.getElementById('overlay-enable');
        const vertexShaderTA = document.getElementById('vertex-shader');
        const fragmentShaderTA = document.getElementById('fragment-shader');
        const compileBtn = document.getElementById('compile-btn');
        const compileStatus = document.getElementById('compile-status');
        const playPauseBtn = document.getElementById('play-pause');
        const asciiInvertBtn = document.getElementById('ascii-invert-btn');
        const uiInvertBtn = document.getElementById('ui-invert-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const exportPng = document.getElementById('export-png');
        const exportMp4 = document.getElementById('export-mp4');
        const recordStatus = document.getElementById('record-status');
        const geometrySelect = document.getElementById('geometry-type');
        const charsetSelect = document.getElementById('charset');
        const glowIntensitySlider = document.getElementById('glowIntensity');
        const glowIntensitySpan = document.getElementById('glow-intensity-val');
        const glowRadiusSlider = document.getElementById('glowRadius');
        const glowRadiusSpan = document.getElementById('glow-radius-val');
        const glowInvertSelect = document.getElementById('glowInvert');

        const sizeSlider = document.getElementById('uSize');
        const sizeSpan = document.getElementById('size-val');
        const detailSlider = document.getElementById('detail');
        const detailSpan = document.getElementById('detail-val');
        const waveSlider = document.getElementById('uWave');
        const waveSpan = document.getElementById('wave-val');
        const speedSlider = document.getElementById('uSpeed');
        const speedSpan = document.getElementById('speed-val');

        const ampSlider = document.getElementById('uAmp');
        const ampSpan = document.getElementById('amp-val');
        const freqSlider = document.getElementById('uFreq');
        const freqSpan = document.getElementById('freq-val');
        const distortSlider = document.getElementById('uDistort');
        const distortSpan = document.getElementById('distort-val');
        const glitchSlider = document.getElementById('uGlitch');
        const glitchSpan = document.getElementById('glitch-val');

        const contrastSlider = document.getElementById('asciiContrast');
        const contrastSpan = document.getElementById('contrast-val');
        const brightnessSlider = document.getElementById('asciiBrightness');
        const brightnessSpan = document.getElementById('brightness-val');
        const densitySlider = document.getElementById('asciiDensity');
        const densitySpan = document.getElementById('density-val');

        // --- Three.js setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 3.0, 0.1, 1000);
        camera.position.set(0, 0, 3);

        const lowResRenderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true });
        lowResRenderer.setSize(LOW_RES_W, LOW_RES_H);
        lowResRenderer.setPixelRatio(1);

        const highResRenderer = new THREE.WebGLRenderer({ preserveDrawingBuffer: true });
        highResRenderer.setSize(HIGH_RES_W, HIGH_RES_H);
        highResRenderer.setPixelRatio(1);

        let currentMesh = null;

        const uniforms = {
            uTime: { value: 0 },
            uSize: { value: 1.0 },
            uWave: { value: 2.0 },
            uSpeed: { value: 0.8 },
            uAmp: { value: 0.3 },
            uFreq: { value: 2.0 },
            uDistort: { value: 0.2 },
            uGlitch: { value: 0.1 }
        };

        let material = new THREE.ShaderMaterial({
            vertexShader: vertexShaderTA.value,
            fragmentShader: fragmentShaderTA.value,
            uniforms: uniforms
        });

        function createGeometry(type, detail) {
            switch(type) {
                case 'sphere': return new THREE.SphereGeometry(1, detail, detail);
                case 'cube': return new THREE.BoxGeometry(1.5, 1.5, 1.5);
                case 'torus': return new THREE.TorusGeometry(0.8, 0.3, detail, detail*2);
                case 'icosahedron': return new THREE.IcosahedronGeometry(1, Math.floor(detail/8));
                default: return new THREE.SphereGeometry(1, 32, 32);
            }
        }

        function rebuildMesh() {
            const type = geometrySelect.value;
            const detail = parseInt(detailSlider.value);
            const geom = createGeometry(type, detail);
            if (currentMesh) scene.remove(currentMesh);
            currentMesh = new THREE.Mesh(geom, material);
            scene.add(currentMesh);
        }
        rebuildMesh();

        function updateUniforms() {
            uniforms.uSize.value = parseFloat(sizeSlider.value);
            uniforms.uWave.value = parseFloat(waveSlider.value);
            uniforms.uSpeed.value = parseFloat(speedSlider.value);
            uniforms.uAmp.value = parseFloat(ampSlider.value);
            uniforms.uFreq.value = parseFloat(freqSlider.value);
            uniforms.uDistort.value = parseFloat(distortSlider.value);
            uniforms.uGlitch.value = parseFloat(glitchSlider.value);
        }
        updateUniforms();

        // Glow params
        glowIntensitySlider.addEventListener('input', () => {
            glowIntensity = parseFloat(glowIntensitySlider.value);
            glowIntensitySpan.textContent = glowIntensity.toFixed(2);
        });
        glowRadiusSlider.addEventListener('input', () => {
            glowRadius = parseFloat(glowRadiusSlider.value);
            glowRadiusSpan.textContent = glowRadius.toFixed(1);
        });
        glowInvertSelect.addEventListener('change', () => {
            glowInvert = glowInvertSelect.value === '1';
        });

        let clock = new THREE.Clock();
        let playing = true;

        // --- ASCII generation (shape) ---
        function getAsciiRamp() {
            let baseRamp = currentRamp;
            if (invertAscii) baseRamp = baseRamp.split('').reverse().join('');
            let density = Math.min(baseRamp.length, Math.max(2, asciiDensity));
            if (density < baseRamp.length) {
                let step = baseRamp.length / density;
                let newRamp = '';
                for (let i = 0; i < density; i++) {
                    newRamp += baseRamp[Math.floor(i * step)];
                }
                return newRamp;
            }
            return baseRamp;
        }

        function luminance(r, g, b) {
            return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function generateShapeAscii() {
            lowResRenderer.render(scene, camera);
            const gl = lowResRenderer.getContext();
            const pixels = new Uint8Array(LOW_RES_W * LOW_RES_H * 4);
            gl.readPixels(0, 0, LOW_RES_W, LOW_RES_H, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

            let asciiStr = '';
            const ramp = getAsciiRamp();
            for (let row = LOW_RES_H - 1; row >= 0; row--) {
                for (let col = 0; col < LOW_RES_W; col++) {
                    const idx = (row * LOW_RES_W + col) * 4;
                    const r = pixels[idx] / 255;
                    const g = pixels[idx+1] / 255;
                    const b = pixels[idx+2] / 255;
                    let l = luminance(r, g, b);
                    l = (l - 0.5) * asciiContrast + 0.5 + asciiBrightness;
                    l = Math.min(1, Math.max(0, l));
                    asciiStr += ramp[Math.floor(l * (ramp.length - 1))];
                }
                asciiStr += '\n';
            }
            return asciiStr;
        }

        // --- Overlay function: shape + custom text (spaces are transparent) ---
        function overlayAscii(shapeStr, customStr) {
            const shapeLines = shapeStr.split('\n');
            const customLines = customStr.split('\n');
            const resultLines = [];

            for (let r = 0; r < ASCII_ROWS; r++) {
                let shapeLine = shapeLines[r] || '';
                let customLine = (r < customLines.length) ? customLines[r] : '';
                let resultLine = '';
                for (let c = 0; c < ASCII_COLS; c++) {
                    const shapeChar = (c < shapeLine.length) ? shapeLine[c] : ' ';
                    const customChar = (c < customLine.length) ? customLine[c] : ' ';
                    // If custom char is not space, use it; otherwise shape char
                    resultLine += (customChar !== ' ' ? customChar : shapeChar);
                }
                resultLines.push(resultLine);
            }
            return resultLines.join('\n');
        }

        // Animation loop: decide what to show
        function animate() {
            requestAnimationFrame(animate);
            if (playing) {
                uniforms.uTime.value += clock.getDelta();
            }

            const shapeAscii = generateShapeAscii();
            let finalAscii = shapeAscii;

            if (overlayEnabled) {
                const custom = customAsciiTextarea.value;
                finalAscii = overlayAscii(shapeAscii, custom);
            }

            asciiOutput.textContent = finalAscii;
        }
        animate();

        // --- Event bindings ---
        function bindSlider(slider, span, callback) {
            slider.addEventListener('input', () => {
                const val = parseFloat(slider.value);
                span.textContent = val.toFixed(2);
                callback(val);
            });
        }

        bindSlider(sizeSlider, sizeSpan, (v) => uniforms.uSize.value = v);
        bindSlider(waveSlider, waveSpan, (v) => uniforms.uWave.value = v);
        bindSlider(speedSlider, speedSpan, (v) => uniforms.uSpeed.value = v);
        bindSlider(ampSlider, ampSpan, (v) => uniforms.uAmp.value = v);
        bindSlider(freqSlider, freqSpan, (v) => uniforms.uFreq.value = v);
        bindSlider(distortSlider, distortSpan, (v) => uniforms.uDistort.value = v);
        bindSlider(glitchSlider, glitchSpan, (v) => uniforms.uGlitch.value = v);

        detailSlider.addEventListener('input', () => {
            detailSpan.textContent = detailSlider.value;
            rebuildMesh();
        });

        geometrySelect.addEventListener('change', rebuildMesh);

        contrastSlider.addEventListener('input', () => {
            asciiContrast = parseFloat(contrastSlider.value);
            contrastSpan.textContent = asciiContrast.toFixed(2);
        });
        brightnessSlider.addEventListener('input', () => {
            asciiBrightness = parseFloat(brightnessSlider.value);
            brightnessSpan.textContent = asciiBrightness.toFixed(2);
        });
        densitySlider.addEventListener('input', () => {
            asciiDensity = parseInt(densitySlider.value);
            densitySpan.textContent = asciiDensity;
        });
        charsetSelect.addEventListener('change', () => {
            currentRamp = charsets[charsetSelect.value];
        });

        playPauseBtn.addEventListener('click', () => {
            playing = !playing;
            playPauseBtn.textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
        });

        asciiInvertBtn.addEventListener('click', () => {
            invertAscii = !invertAscii;
        });

        uiInvertBtn.addEventListener('click', () => {
            document.body.classList.toggle('ui-invert');
        });

        fullscreenBtn.addEventListener('click', () => {
            document.querySelector('.app').requestFullscreen();
        });

        compileBtn.addEventListener('click', () => {
            try {
                const newMaterial = new THREE.ShaderMaterial({
                    vertexShader: vertexShaderTA.value,
                    fragmentShader: fragmentShaderTA.value,
                    uniforms: uniforms
                });
                const testMesh = new THREE.Mesh(new THREE.SphereGeometry(1,3), newMaterial);
                scene.add(testMesh);
                lowResRenderer.render(scene, camera);
                scene.remove(testMesh);
                material = newMaterial;
                currentMesh.material = material;
                compileStatus.textContent = '✓ compiled';
            } catch (e) {
                compileStatus.textContent = '✗ error: ' + e.message;
                console.error(e);
            }
        });

        // Overlay toggle
        overlayCheckbox.addEventListener('change', (e) => {
            overlayEnabled = e.target.checked;
        });

        // Apply custom button: just triggers a redraw (the animation loop already uses textarea value)
        applyCustomBtn.addEventListener('click', () => {
            // No need to store, just refresh
        });

        // --- 4K PNG Export (with glow, includes overlay if enabled) ---
        function getCurrentAsciiForExport() {
            const shapeAscii = generateShapeAscii();
            if (overlayEnabled) {
                return overlayAscii(shapeAscii, customAsciiTextarea.value);
            }
            return shapeAscii;
        }

        function createGlowComposite(asciiString) {
            // Create canvas for ASCII mask (white text on black)
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = HIGH_RES_W;
            maskCanvas.height = HIGH_RES_H;
            const maskCtx = maskCanvas.getContext('2d');
            maskCtx.fillStyle = '#000000';
            maskCtx.fillRect(0, 0, HIGH_RES_W, HIGH_RES_H);
            maskCtx.fillStyle = '#ffffff';
            maskCtx.font = `bold ${Math.floor(HIGH_RES_W / ASCII_COLS * 1.2)}px 'Courier New', monospace`;
            maskCtx.textBaseline = 'top';

            const lines = asciiString.split('\n');
            for (let row = 0; row < Math.min(lines.length, ASCII_ROWS); row++) {
                const line = lines[row];
                for (let col = 0; col < Math.min(line.length, ASCII_COLS); col++) {
                    const char = line[col];
                    const x = col * (HIGH_RES_W / ASCII_COLS);
                    const y = row * (HIGH_RES_H / ASCII_ROWS);
                    maskCtx.fillText(char, x, y);
                }
            }

            // Blur the mask to create glow spread
            const blurredCanvas = document.createElement('canvas');
            blurredCanvas.width = HIGH_RES_W;
            blurredCanvas.height = HIGH_RES_H;
            const blurredCtx = blurredCanvas.getContext('2d');
            blurredCtx.filter = `blur(${glowRadius}px)`;
            blurredCtx.drawImage(maskCanvas, 0, 0);

            // Get GLSL background pixels
            highResRenderer.render(scene, camera);
            const gl = highResRenderer.getContext();
            const glslPixels = new Uint8Array(HIGH_RES_W * HIGH_RES_H * 4);
            gl.readPixels(0, 0, HIGH_RES_W, HIGH_RES_H, gl.RGBA, gl.UNSIGNED_BYTE, glslPixels);

            // Get mask and blurred mask pixel data
            const maskData = maskCtx.getImageData(0, 0, HIGH_RES_W, HIGH_RES_H).data;
            const blurData = blurredCtx.getImageData(0, 0, HIGH_RES_W, HIGH_RES_H).data;

            // Composite: final = ASCII (white) where mask > 0, else GLSL * glowIntensity * blur(mask) with optional invert
            const outputCanvas = document.createElement('canvas');
            outputCanvas.width = HIGH_RES_W;
            outputCanvas.height = HIGH_RES_H;
            const outCtx = outputCanvas.getContext('2d');
            const outImage = outCtx.createImageData(HIGH_RES_W, HIGH_RES_H);
            const outData = outImage.data;

            for (let i = 0; i < outData.length; i += 4) {
                const maskVal = maskData[i]; // 0 or 255
                const blurVal = blurData[i] / 255; // 0..1

                // GLSL background pixel (grayscale, take R)
                const glslVal = glslPixels[i] / 255;

                let r, g, b;
                if (maskVal > 128) {
                    // ASCII character: white
                    r = g = b = 255;
                } else {
                    // Background: modulated by glow
                    let glowFactor = blurVal * glowIntensity;
                    if (glowInvert) glowFactor = 1 - glowFactor;
                    const bg = glslVal * glowFactor;
                    r = g = b = Math.floor(bg * 255);
                }
                outData[i] = r;
                outData[i+1] = g;
                outData[i+2] = b;
                outData[i+3] = 255;
            }
            outCtx.putImageData(outImage, 0, 0);
            return outputCanvas;
        }

        exportPng.addEventListener('click', () => {
            const ascii = getCurrentAsciiForExport();
            const glowCanvas = createGlowComposite(ascii);
            glowCanvas.toBlob(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'colignum_glow_4k.png';
                link.click();
                URL.revokeObjectURL(link.href);
            }, 'image/png');
        });

        // --- 4K MP4 Export (10 seconds, glow) ---
        exportMp4.addEventListener('click', async () => {
            if (window.recordingHighRes) {
                recordStatus.textContent = 'Recording already in progress';
                return;
            }

            const outCanvas = document.createElement('canvas');
            outCanvas.width = HIGH_RES_W;
            outCanvas.height = HIGH_RES_H;
            const outCtx = outCanvas.getContext('2d');

            const stream = outCanvas.captureStream(30);
            let mimeType = 'video/mp4;codecs=avc1';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm';
            }

            const mediaRecorder = new MediaRecorder(stream, { mimeType });
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: mimeType });
                const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `colignum_glow_4k_10s.${ext}`;
                link.click();
                URL.revokeObjectURL(link.href);
                recordStatus.textContent = '';
                window.recordingHighRes = false;
                cancelAnimationFrame(recordingRAF);
            };

            mediaRecorder.start();
            window.recordingHighRes = true;
            recordStatus.textContent = '⚫ REC 4K GLOW (10s)...';

            const startTime = performance.now();
            const recordFrame = () => {
                if (!window.recordingHighRes) return;
                const ascii = getCurrentAsciiForExport();
                const glowCanvas = createGlowComposite(ascii);
                outCtx.drawImage(glowCanvas, 0, 0);
                if (performance.now() - startTime < 10000) {
                    requestAnimationFrame(recordFrame);
                } else {
                    mediaRecorder.stop();
                }
            };
            const recordingRAF = requestAnimationFrame(recordFrame);
        });

        compileStatus.textContent = 'ready • overlay ready';
    })();
</script>
</body>
