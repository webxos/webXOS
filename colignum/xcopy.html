        * {

<body>
<div class="container">
    <h1>
        <i class="fas fa-copy"></i> Modern X‑Copy by Colignum
    </h1>
    <div class="subhead">
        <i class="fas fa-database"></i> .zip based x-copy clone
    </div>

    <!-- Message area for feedback -->
    <div id="globalMessage"></div>

    <div class="card-grid">
        <!-- Compile card -->
        <div class="card">
            <h2><i class="fas fa-layer-group"></i> Compile Repo</h2>
            <div class="input-group">
                <label><i class="far fa-folder-open"></i> Base path (prefix)</label>
                <input type="text" id="basePath" value="myrepo/" placeholder="e.g. myrepo/">
            </div>
            <div class="input-group">
                <label><i class="fas fa-upload"></i> Select files</label>
                <input type="file" id="uploadFiles" multiple>
            </div>
            <button onclick="compileRepo()"><i class="fas fa-save"></i> Compile & Store</button>
        </div>

        <!-- Export card -->
        <div class="card">
            <h2><i class="fas fa-file-archive"></i> Export as ZIP</h2>
            <p style="margin-bottom:1rem; color:#475569;">Download all stored files as a single ZIP archive.</p>
            <button onclick="exportRepo()"><i class="fas fa-download"></i> Export ZIP</button>
        </div>

        <!-- Import ZIP card -->
        <div class="card">
            <h2><i class="fas fa-file-import"></i> Import ZIP</h2>
            <div class="input-group">
                <label><i class="fas fa-upload"></i> Choose a ZIP file</label>
                <input type="file" id="uploadZip" accept=".zip">
            </div>
            <button onclick="importZip()"><i class="fas fa-box-open"></i> Import & Store</button>
        </div>
    </div>

    <!-- Repository viewer -->
    <div class="card" style="margin-bottom:1rem;">
        <h2><i class="fas fa-tree"></i> Stored Files</h2>
        <div style="display: flex; gap:1rem; align-items: center; margin-bottom:1rem;">
            <button onclick="viewRepo()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button onclick="clearRepo()" style="background:#dc2626;"><i class="fas fa-trash-alt"></i> Clear All</button>
        </div>
        <div id="output" class="file-list">
            <!-- Dynamically filled -->
            <div style="text-align:center; color:#64748b; padding:1rem;"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-dharmachakra"></i> WEBXOS 2026. COLIGNUM 2026.
        <br><span id="pwaNotice" style="opacity:0.7;"></span>
    </div>
</div>

<script src="https://unpkg.com/idb@8/build/umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    (function() {
        // ========== IndexedDB setup ==========
        let db;
        async function initDB() {
            if (!db) {
                db = await idb.openDB('XCopyRepo', 1, {
                    upgrade(db) {
                        if (!db.objectStoreNames.contains('files')) {
                            db.createObjectStore('files');
                        }
                    }
                });
            }
            return db;
        }

        // ========== Storage quota check ==========
        async function checkStorage() {
            if (navigator.storage && navigator.storage.estimate) {
                const estimate = await navigator.storage.estimate();
                const usedMB = (estimate.usage / 1e6).toFixed(2);
                const quotaMB = (estimate.quota / 1e6).toFixed(2);
                const percent = (estimate.usage / estimate.quota * 100).toFixed(1);
                if (estimate.usage > estimate.quota * 0.9) {
                    showMessage(`Storage almost full: ${usedMB} MB / ${quotaMB} MB (${percent}%)`, 'warning');
                }
                return { usedMB, quotaMB, percent };
            }
            return null;
        }

        // ========== UI Helpers ==========
        function showMessage(msg, type = 'info') {
            const area = document.getElementById('globalMessage');
            area.innerHTML = `<div class="message ${type}"><i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}</div>`;
            setTimeout(() => { if (area.innerHTML.includes(msg)) area.innerHTML = ''; }, 5000);
        }

        // ========== Core functions ==========
        window.compileRepo = async function() {
            const files = document.getElementById('uploadFiles').files;
            if (files.length === 0) return showMessage('No files selected', 'error');

            const basePath = document.getElementById('basePath').value.trim();
            if (!basePath) return showMessage('Please enter a base path', 'error');

            await checkStorage();
            const db = await initDB();
            const tx = db.transaction('files', 'readwrite');

            try {
                for (let file of files) {
                    // Use webkitRelativePath if available (for folders), else just name
                    let relative = file.webkitRelativePath || file.name;
                    // Avoid absolute paths
                    if (relative.startsWith('/')) relative = relative.substring(1);
                    const path = basePath + (basePath.endsWith('/') ? '' : '/') + relative;
                    await tx.store.put(file, path);
                }
                await tx.done;
                showMessage(`Stored ${files.length} file(s)`, 'success');
                viewRepo();
            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }
        };

        window.exportRepo = async function() {
            const db = await initDB();
            const tx = db.transaction('files', 'readonly');
            const zip = new JSZip();
            let count = 0;

            try {
                let cursor = await tx.store.openCursor();
                while (cursor) {
                    zip.file(cursor.key, cursor.value);
                    cursor = await cursor.continue();
                    count++;
                }
                await tx.done;

                if (count === 0) {
                    return showMessage('No files to export', 'error');
                }

                const content = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'repo.zip';
                a.click();
                URL.revokeObjectURL(url);
                showMessage(`Exported ${count} files`, 'success');
            } catch (err) {
                showMessage('ZIP error: ' + err.message, 'error');
            }
        };

        window.importZip = async function() {
            const zipFile = document.getElementById('uploadZip').files[0];
            if (!zipFile) return showMessage('Select a ZIP file', 'error');

            await checkStorage();
            const db = await initDB();
            const tx = db.transaction('files', 'readwrite');

            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(zipFile);
                let fileCount = 0;
                for (let path in contents.files) {
                    const file = contents.files[path];
                    if (!file.dir) {
                        const blob = await file.async('blob');
                        await tx.store.put(blob, path);
                        fileCount++;
                    }
                }
                await tx.done;
                showMessage(`Imported ${fileCount} files`, 'success');
                viewRepo();
            } catch (err) {
                showMessage('ZIP import error: ' + err.message, 'error');
            }
        };

        window.viewRepo = async function() {
            const output = document.getElementById('output');
            output.innerHTML = `<div style="text-align:center; padding:1rem;"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>`;

            const db = await initDB();
            const tx = db.transaction('files', 'readonly');
            const files = [];
            let cursor = await tx.store.openCursor();
            while (cursor) {
                files.push(cursor.key);
                cursor = await cursor.continue();
            }
            await tx.done;

            if (files.length === 0) {
                output.innerHTML = '<div style="text-align:center; color:#64748b; padding:2rem;"><i class="fas fa-folder-open"></i> No files stored.</div>';
                return;
            }

            let html = '';
            files.sort().forEach(key => {
                const safeKey = encodeURIComponent(key);
                html += `<div class="file-item">
                    <div class="file-info">
                        <i class="fas fa-file"></i>
                        <span title="${key}">${key.length > 50 ? key.substr(0,47)+'...' : key}</span>
                    </div>
                    <div class="file-actions">
                        <button onclick="downloadFile('${safeKey}')" title="Download"><i class="fas fa-download"></i></button>
                    </div>
                </div>`;
            });
            output.innerHTML = html;
        };

        window.downloadFile = async function(encodedKey) {
            const key = decodeURIComponent(encodedKey);
            const db = await initDB();
            try {
                const blob = await db.get('files', key);
                if (!blob) throw new Error('File not found');
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = key.split('/').pop() || 'file';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                showMessage('Download error: ' + err.message, 'error');
            }
        };

        window.clearRepo = async function() {
            if (!confirm('Permanently delete ALL stored files?')) return;
            const db = await initDB();
            const tx = db.transaction('files', 'readwrite');
            await tx.store.clear();
            await tx.done;
            showMessage('Repository cleared', 'success');
            viewRepo();
        };

        // ========== PWA: attempt service worker from Blob (will fail, but we catch it) ==========
        if ('serviceWorker' in navigator) {
            // Try to register a minimal service worker from a blob (this will not work due to browser security, but we show a notice)
            const swCode = `
                self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).then(reg => {
                console.log('SW registered (unexpectedly)');
                document.getElementById('pwaNotice').innerText = '✅ Ready to install (service worker active).';
            }).catch(err => {
                console.warn('SW registration failed (expected from blob):', err);
                document.getElementById('pwaNotice').innerHTML = '⚠️ IndexedDB Based.';
            });
        } else {
            document.getElementById('pwaNotice').innerText = 'Service workers not supported – app still works.';
        }

        // ========== Init ==========
        initDB().then(() => {
            viewRepo();
            checkStorage();
        });
    })();
</script>
<!-- One-line manifest fallback: the base64 manifest above is enough -->
</body>
