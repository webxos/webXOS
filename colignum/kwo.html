    <style>
        /* ---------- Reset & Base ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-card: #000000;
            --bg-input: #000000;
            --text-primary: #e8e8f0;
            --text-secondary: #a8a8c8;
            --text-muted: #6a6a8a;
            --accent: #818cff;
            --accent-hover: #ffffff;
            --accent-glow: rgba(129, 140, 255, 0.25);
            --border-color: #2a2a5a;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 16px 40px;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(129, 140, 255, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 20%, rgba(129, 140, 255, 0.04) 0%, transparent 60%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------- App Container ---------- */
        .app {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        /* ---------- Header ---------- */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .app-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon {
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            box-shadow: 0 0 0 1px var(--border-color);
            flex-shrink: 0;
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .app-title span {
            font-weight: 400;
            -webkit-text-fill-color: var(--text-secondary);
            opacity: 0.6;
        }

        .app-badge {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        /* ---------- Card ---------- */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 24px 24px 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(2px);
            transition: border-color var(--transition);
        }

        .card:focus-within {
            border-color: var(--accent);
        }

        /* ---------- Label ---------- */
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .label-row label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .label-row .char-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        /* ---------- Textarea ---------- */
        .text-input {
            width: 100%;
            min-height: 160px;
            padding: 16px 18px;
            font-size: 1rem;
            font-family: var(--font);
            line-height: 1.7;
            color: var(--text-primary);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            resize: vertical;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        .text-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .text-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        /* ---------- Buttons ---------- */
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: var(--font);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), transform var(--transition),
                box-shadow var(--transition);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            flex: 1 1 auto;
            min-width: 140px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(129, 140, 255, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px rgba(129, 140, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-success {
            background: #000000;
            color: #fff;
            box-shadow: 0 4px 16px rgba(45, 138, 78, 0.3);
        }

        .btn-success:hover {
            background: #000000;
            box-shadow: 0 6px 24px rgba(45, 138, 78, 0.4);
        }

        .btn .icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        /* ---------- Results ---------- */
        .results-area {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: none;
            animation: fadeSlide 0.35s ease;
        }

        .results-area.visible {
            display: block;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .results-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .results-stats {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .results-stats span {
            background: var(--bg-primary);
            padding: 2px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .results-stats .stat-highlight {
            color: var(--accent);
            font-weight: 600;
        }

        .results-output {
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            min-height: 60px;
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-primary);
            word-break: break-word;
            white-space: pre-wrap;
            font-family: var(--font);
            transition: border-color var(--transition);
        }

        .results-output:focus {
            outline: none;
            border-color: var(--accent);
        }

        .results-output .empty-message {
            color: var(--text-muted);
            font-style: italic;
            opacity: 0.6;
        }

        .results-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .results-actions .btn {
            flex: 1 1 auto;
            min-width: 100px;
            padding: 10px 20px;
            font-size: 0.85rem;
        }

        /* ---------- Footer ---------- */
        .app-footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 16px;
            padding: 8px 0;
            letter-spacing: 0.03em;
        }

        .app-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .app-footer a:hover {
            text-decoration: underline;
        }

        /* ---------- Toast ---------- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast .toast-icon {
            font-size: 1.2rem;
        }

        /* ---------- Scrollbar ---------- */
        .results-output::-webkit-scrollbar {
            width: 5px;
        }
        .results-output::-webkit-scrollbar-track {
            background: var(--bg-input);
        }
        .results-output::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 8px;
        }
        .results-output::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 540px) {
            body {
                padding: 16px 12px 32px;
            }

            .card {
                padding: 18px 16px 22px;
            }

            .app-title {
                font-size: 1.25rem;
            }
            .app-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .app-badge {
                font-size: 0.55rem;
                padding: 2px 10px;
            }

            .text-input {
                min-height: 120px;
                font-size: 0.95rem;
                padding: 14px;
            }

            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
                min-width: 100px;
            }

            .results-output {
                font-size: 0.9rem;
                max-height: 200px;
                padding: 14px;
            }

            .results-stats {
                font-size: 0.65rem;
                gap: 8px;
            }
            .results-stats span {
                padding: 2px 10px;
            }

            .action-row {
                flex-direction: column;
            }
            .action-row .btn {
                width: 100%;
            }

            .results-actions .btn {
                flex: 1 1 45%;
            }

            .toast {
                bottom: 20px;
                padding: 10px 20px;
                font-size: 0.85rem;
                max-width: 90%;
                white-space: nowrap;
            }
        }

        @media (max-width: 380px) {
            .app-header {
                flex-wrap: wrap;
                gap: 8px;
            }
            .app-badge {
                margin-left: auto;
            }
            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* ---------- Reduced motion ---------- */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ---------- Selection ---------- */
        ::selection {
            background: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- ====== APP ====== -->
    <div class="app" role="main">

        <!-- Header -->
        <header class="app-header">
            <div class="app-brand">
                <div class="app-icon" aria-hidden="true">KWO</div>
                <h1 class="app-title">Keywords <span>Only</span></h1>
            </div>
            <span class="app-badge">Prompt filter</span>
        </header>

        <!-- Input Card -->
        <section class="card" aria-label="Text input">
            <div class="label-row">
                <label for="textInput">Paste or type your text</label>
                <span class="char-count" id="charCount" aria-live="polite">0 chars</span>
            </div>

            <textarea
            id="textInput"
            class="text-input"
            placeholder="Paste a paragraph, article, or any text here…&#10;The app will extract the most important nouns."
            spellcheck="true"
            autofocus
        >Insert your prompt here...</textarea>

        <div class="action-row">
            <button class="btn btn-primary" id="extractBtn" type="button">
                <span class="icon" aria-hidden="true">X</span> Extract Keywords
            </button>
            <button class="btn btn-secondary" id="clearBtn" type="button">
                <span class="icon" aria-hidden="true">X</span> Clear
            </button>
        </div>
    </section>

    <!-- Results Card -->
    <section class="card" aria-label="Extracted nouns">
        <div class="results-area" id="resultsArea">
            <div class="results-header">
                <h3> Extracted Keywords</h3>
                <div class="results-stats">
                    <span id="nounCount">0 Keywords</span>
                    <span id="wordCount">0 total words</span>
                </div>
            </div>

            <div class="results-output" id="resultsOutput" tabindex="0" role="textbox" aria-label="Extracted nouns list">
                <span class="empty-message">No Keywords extracted yet.</span>
            </div>

            <div class="results-actions">
                <button class="btn btn-success" id="copyBtn" type="button">
                    <span class="icon" aria-hidden="true">📄</span> Copy
                </button>
                <button class="btn btn-secondary" id="copyCsvBtn" type="button">
                    <span class="icon" aria-hidden="true">📋</span> Copy as CSV
                </button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="app-footer">
        <span>Keywords Only &bull; COLIGNUM 2026 &bull; </span>
    </footer>
</div>

<!-- ====== TOAST ====== -->
<div class="toast" id="toast" role="alert" aria-live="polite">
    <span class="toast-icon" aria-hidden="true">✓</span>
    <span id="toastMessage">Copied!</span>
</div>

<script>

        // ---------- Filler word list (200+) ----------

        // ---------- State ----------
        let extractedNouns = [];

        // ---------- Helpers ----------
        function showToast(msg, icon = '✓') {
            toastMessage.textContent = msg;
            toast.querySelector('.toast-icon').textContent = icon;
            toast.classList.add('show');
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }

        function updateCharCount() {
            const len = textInput.value.length;
            charCount.textContent = len + ' char' + (len !== 1 ? 's' : '');
        }

        // ---------- Core: extract nouns ----------
        function extractNouns(text) {
            if (!text || !text.trim()) return [];

            // 1. Tokenize: split on whitespace and punctuation, keep only alphabetic chars
            const tokens = text
                .toLowerCase()
                .replace(/[^a-z\s']/g, ' ') // keep letters, spaces, apostrophes
                .split(/\s+/)
                .filter(t => t.length > 0);

            // 2. Filter: length >= 4, not a filler word, not purely numeric
            const filtered = tokens.filter(token => {
                // Remove possessive 's
                const clean = token.replace(/'s$/, '');
                if (clean.length < 4) return false;
                if (/^\d+$/.test(clean)) return false;
                if (FILLER_WORDS.has(clean)) return false;
                return true;
            });

            // 3. Deduplicate while preserving order
            const seen = new Set();
            const unique = [];
            for (const word of filtered) {
                if (!seen.has(word)) {
                    seen.add(word);
                    unique.push(word);
                }
            }

            return unique;
        }

        // ---------- Render results ----------
        function renderResults(nouns, originalText) {
            const totalWords = originalText.trim() ?
                originalText.toLowerCase().replace(/[^a-z\s']/g, ' ').split(/\s+/).filter(t => t.length > 0).length :
                0;

            if (nouns.length === 0) {
                resultsOutput.innerHTML = `<span class="empty-message">No Keywords found. Try pasting more text!</span>`;
                nounCount.textContent = '0 keywords';
                wordCount.textContent = '0 total words';
                resultsArea.classList.remove('visible');
                return;
            }

            // Display as a clean, comma-separated list with line breaks for readability
            const displayText = nouns.join(', ');
            resultsOutput.textContent = displayText;
            resultsOutput.innerHTML = displayText; // plain text

            nounCount.textContent = nouns.length + ' keyword' + (nouns.length !== 1 ? 's' : '');
            wordCount.textContent = totalWords + ' total word' + (totalWords !== 1 ? 's' : '');

            resultsArea.classList.add('visible');
            extractedNouns = nouns;
        }

        // ---------- Process ----------
        function processText() {
            const text = textInput.value;
            if (!text.trim()) {
                showToast('Please paste some text first', '⚠️');
                return;
            }

            const nouns = extractNouns(text);
            renderResults(nouns, text);

            if (nouns.length > 0) {
                showToast(`Extracted ${nouns.length} Keywords!`, 'X');
            } else {
                showToast('No nouns found', '🔍');
            }
        }

        // ---------- Copy functions ----------
        function copyToClipboard(text, successMsg = 'Copied!') {
            if (!text || text.length === 0) {
                showToast('Nothing to copy', '⚠️');
                return;
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast(successMsg, '📄'))
                    .catch(() => fallbackCopy(text, successMsg));
            } else {
                fallbackCopy(text, successMsg);
            }
        }

        function fallbackCopy(text, successMsg) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            ta.style.width = '1px';
            ta.style.height = '1px';
            ta.style.padding = '0';
            ta.style.border = 'none';
            ta.style.outline = 'none';
            ta.style.boxShadow = 'none';
            ta.style.background = 'transparent';
            document.body.appendChild(ta);
            ta.select();
            try {
                const ok = document.execCommand('copy');
                if (ok) showToast(successMsg, '📄');
                else showToast('Copy failed. Select and copy manually.', '⚠️');
            } catch (_) {
                showToast('Copy failed. Select and copy manually.', '⚠️');
            }
            document.body.removeChild(ta);
        }

        function handleCopy() {
            if (extractedNouns.length === 0) {
                showToast('No nouns to copy', '⚠️');
                return;
            }
            const text = extractedNouns.join(', ');
            copyToClipboard(text, 'Nouns copied!');
        }

        function handleCopyCsv() {
            if (extractedNouns.length === 0) {
                showToast('No nouns to copy', '⚠️');
                return;
            }
            // One per line for easy pasting into spreadsheets
            const text = extractedNouns.join('\n');
            copyToClipboard(text, 'CSV copied!');
        }

        // ---------- Clear ----------
        function handleClear() {
            textInput.value = '';
            textInput.focus();
            updateCharCount();
            resultsArea.classList.remove('visible');
            resultsOutput.innerHTML = `<span class="empty-message">No nouns extracted yet.</span>`;
            extractedNouns = [];
            nounCount.textContent = '0 nouns';
            wordCount.textContent = '0 total words';
            showToast('Cleared', '✕');
        }

        // ---------- Auto-extract on paste? ----------
        // We'll let the user click the button, but we also support Ctrl+Enter
        textInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                extractBtn.click();
            }
        });

        // Update char count on input
        textInput.addEventListener('input', updateCharCount);

        // ---------- Button events ----------
        extractBtn.addEventListener('click', processText);
        clearBtn.addEventListener('click', handleClear);
        copyBtn.addEventListener('click', handleCopy);
        copyCsvBtn.addEventListener('click', handleCopyCsv);

        // ---------- PWA: Service Worker registration ----------
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                // Inline service worker as a blob URL.
                // This works in Chrome, Edge, and modern Chromium browsers.
                const swCode = `
                    const CACHE_NAME = 'nouns-only-v2';
                    const ASSETS = [
                        './',
                        './index.html'
                    ];

                    self.addEventListener('install', (e) => {
                        e.waitUntil(
                            caches.open(CACHE_NAME)
                                .then((cache) => cache.addAll(ASSETS))
                                .then(() => self.skipWaiting())
                        );
                    });

                    self.addEventListener('activate', (e) => {
                        e.waitUntil(
                            caches.keys().then((keys) =>
                                Promise.all(
                                    keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k))
                                )
                            ).then(() => self.clients.claim())
                        );
                    });

                    self.addEventListener('fetch', (e) => {
                        e.respondWith(
                            caches.match(e.request)
                                .then((cached) => cached || fetch(e.request))
                                .catch(() => caches.match('./'))
                        );
                    });
                `;

                try {
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(blob);
                    navigator.serviceWorker.register(swUrl, { scope: './' })
                        .then((reg) => {
                            console.log('[PWA] Service Worker registered successfully.');
                            pwaStatus.textContent = '✅ Offline ready';
                            pwaStatus.style.color = '#4ade80';
                        })
                        .catch((err) => {
                            console.warn('[PWA] Service Worker registration failed:', err);
                            pwaStatus.textContent = '⚠️ Installable (SW failed)';
                            pwaStatus.style.color = '#fbbf24';
                        });
                } catch (_) {
                    console.warn('[PWA] Could not register Service Worker.');
                    pwaStatus.textContent = '⚠️ Installable (SW error)';
                    pwaStatus.style.color = '#f87171';
                }
            } else {
                pwaStatus.textContent = '⚠️ PWA not supported';
                pwaStatus.style.color = '#f87171';
            }
        }

        // ---------- Init ----------
        function init() {
            updateCharCount();

            // If there's initial text, auto-process after a tiny delay
            if (textInput.value.trim()) {
                setTimeout(() => {
                    const nouns = extractNouns(textInput.value);
                    renderResults(nouns, textInput.value);
                }, 200);
            }

            registerServiceWorker();

            // Log the filler word count for debugging
            console.log(`[Nouns Only] Loaded ${FILLER_WORDS.size} filler words.`);
        }

        // Run on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
</body>
</html>
