<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>COLIGNUM: PERFECT PNG</title>
<style>
  :root {
    --bg: #fff;
    --fg: #000;
    --grid: #ccc;
    --tool-bg: #f0f0f0;
    --node-title-bg: #ddd;
    --port-bg: #fff;
  }
  body.inverted {
    --bg: #000;
    --fg: #fff;
    --grid: #333;
    --tool-bg: #111;
    --node-title-bg: #333;
    --port-bg: #000;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', Courier, monospace;
    transition: background-color 0.1s, color 0.1s;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  .toolbar {
    padding: 10px 16px;
    background: var(--tool-bg);
    border-bottom: 2px solid var(--fg);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
    z-index: 100;
  }
  .toolbar button {
    background: var(--bg);
    border: 2px solid var(--fg);
    color: var(--fg);
    padding: 7px 16px;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    border-radius: 0;
    box-shadow: 4px 4px 0 var(--fg);
    transition: 0.05s linear;
    font-family: inherit;
    user-select: none;
  }
  .toolbar button:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--fg);
  }
  .toolbar button.active {
    background: var(--grid);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--fg);
  }
  .toolbar input {
    width: 60px;
    padding: 6px;
    border: 2px solid var(--fg);
    background: var(--bg);
    color: var(--fg);
    font-weight: bold;
    text-align: center;
    box-shadow: 2px 2px 0 var(--fg);
    font-family: inherit;
  }
  .toolbar span {
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 1px;
    user-select: none;
  }
  .toolbar .brand {
    font-size: 1.3rem;
    margin-right: 8px;
    border-right: 2px solid var(--fg);
    padding-right: 16px;
  }

  .canvas-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    cursor: default;
  }
  .canvas-wrapper.panning {
    cursor: grab;
  }
  .canvas-wrapper.panning:active {
    cursor: grabbing;
  }
  .canvas-wrapper.drawing-mode {
    cursor: crosshair;
  }
  .canvas-wrapper.text-mode {
    cursor: cell;
  }

  #transformLayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* Grid SVG */
  #gridSvg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
  }

  /* Connection SVG */
  #connectionSvg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 5;
  }
  #connectionSvg .link-group {
    pointer-events: auto;
    cursor: pointer;
  }
  #connectionSvg .link-hit {
    fill: none;
    stroke: transparent;
    stroke-width: 16;
    pointer-events: stroke;
  }
  #connectionSvg .link-visible {
    fill: none;
    stroke: var(--fg);
    stroke-width: 3;
    stroke-linecap: round;
    pointer-events: none;
    transition: stroke-width 0.1s;
  }
  #connectionSvg .link-group:hover .link-visible,
  #connectionSvg .link-group.selected .link-visible {
    stroke-width: 5;
  }
  #connectionSvg .link-group.selected .link-visible {
    stroke: #d00;
  }
  body.inverted #connectionSvg .link-group.selected .link-visible {
    stroke: #f55;
  }
  #connectionSvg .link-delete-btn {
    fill: var(--bg);
    stroke: var(--fg);
    stroke-width: 2;
    cursor: pointer;
    pointer-events: auto;
  }
  #connectionSvg .link-delete-icon {
    fill: var(--fg);
    pointer-events: none;
    font-family: Arial, sans-serif;
    font-size: 10px;
    font-weight: bold;
    text-anchor: middle;
    dominant-baseline: central;
  }
  #connectionSvg .temp-link {
    fill: none;
    stroke: var(--fg);
    stroke-width: 3;
    stroke-dasharray: 8 4;
    stroke-linecap: round;
    pointer-events: none;
    opacity: 0.7;
  }
  #connectionSvg .stroke-polyline {
    fill: none;
    stroke: var(--fg);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  /* Nodes */
  .node {
    position: absolute;
    min-width: 180px;
    min-height: 100px;
    background: var(--bg);
    border: 3px solid var(--fg);
    box-shadow: 8px 8px 0 var(--fg);
    color: var(--fg);
    z-index: 10;
    display: flex;
    flex-direction: column;
    font-size: 15px;
    line-height: 1.4;
    user-select: none;
  }
  .node.selected {
    box-shadow: 8px 8px 0 #d00;
    border-color: #d00;
  }
  body.inverted .node.selected {
    box-shadow: 8px 8px 0 #f55;
    border-color: #f55;
  }
  .node .node-title {
    height: 28px;
    background: var(--node-title-bg);
    border-bottom: 2px solid var(--fg);
    cursor: grab;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    user-select: none;
  }
  .node .node-title:active {
    cursor: grabbing;
  }
  .node .node-body {
    padding: 10px 8px;
    outline: none;
    background: transparent;
    color: inherit;
    word-break: break-word;
    white-space: pre-wrap;
    cursor: text;
    font-size: 15px;
    border: none;
    resize: none;
    font-family: 'Courier New', monospace;
    flex: 1;
    overflow-y: auto;
    user-select: text;
    -webkit-user-select: text;
  }
  .node .delete-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    width: 26px;
    height: 26px;
    background: var(--fg);
    border: 2px solid var(--bg);
    color: var(--bg);
    font-weight: bold;
    font-size: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 25;
    box-shadow: 2px 2px 0 var(--fg);
    user-select: none;
  }
  .node .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 18px;
    height: 18px;
    background: var(--fg);
    border: 2px solid var(--bg);
    cursor: nwse-resize;
    z-index: 25;
    box-shadow: -2px -2px 0 var(--fg);
  }

  /* Ports */
  .port {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--port-bg);
    border: 2px solid var(--fg);
    cursor: crosshair;
    z-index: 30;
    user-select: none;
  }
  .port:hover {
    transform: scale(1.3);
  }
  .port.input-port {
    left: -9px;
  }
  .port.output-port {
    right: -9px;
  }
  .port-label {
    position: absolute;
    font-size: 10px;
    font-weight: bold;
    color: var(--fg);
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
  }
  .port-label.input-label {
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
  }
  .port-label.output-label {
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Text Labels */
  .text-label {
    position: absolute;
    min-width: 100px;
    min-height: 30px;
    background: var(--bg);
    border: 2px solid var(--fg);
    box-shadow: 4px 4px 0 var(--fg);
    color: var(--fg);
    z-index: 15;
    display: flex;
    flex-direction: column;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    line-height: 1.3;
    user-select: none;
  }
  .text-label.selected {
    box-shadow: 4px 4px 0 #d00;
    border-color: #d00;
  }
  body.inverted .text-label.selected {
    box-shadow: 4px 4px 0 #f55;
    border-color: #f55;
  }
  .text-label .text-drag {
    height: 14px;
    background: var(--node-title-bg);
    border-bottom: 1px solid var(--fg);
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--fg);
    flex-shrink: 0;
    user-select: none;
  }
  .text-label .text-drag:active {
    cursor: grabbing;
  }
  .text-label .text-content {
    padding: 6px 8px;
    outline: none;
    background: transparent;
    color: inherit;
    word-break: break-word;
    white-space: pre-wrap;
    cursor: text;
    font-family: Arial, Helvetica, sans-serif;
    font-size: inherit;
    border: none;
    resize: none;
    min-height: 30px;
    user-select: text;
    -webkit-user-select: text;
  }
  .text-label .delete-btn {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 22px;
    height: 22px;
    background: var(--fg);
    border: 2px solid var(--bg);
    color: var(--bg);
    font-weight: bold;
    font-size: 12px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 25;
    box-shadow: 2px 2px 0 var(--fg);
    user-select: none;
  }
</style>
<base target="_blank">
</head>
<body>
<div id="app">
  <div class="toolbar">
    <span class="brand">COLIGNUM: PERFECT PNG</span>
    <button id="addNodeBtn">ADD BOX</button>
    <button id="exportPngBtn">EXPORT 8K PNG</button>
    <button id="fullscreenBtn">FULLSCREEN</button>
    <button id="invertBtn">INVERT B/W</button>
    <button id="drawBtn">DRAW</button>
    <button id="textBtn">TEXT</button>
    <div style="display:flex;align-items:center;gap:4px;">
      <span style="font-weight:bold;">SIZE</span>
      <input type="number" id="fontSizeInput" min="10" max="30" value="16" step="1">
    </div>
    <button id="undoBtn">↩ UNDO</button>
    <button id="redoBtn">↪ REDO</button>
    <span style="opacity:0.7;margin-left:auto;">2026</span>
  </div>
  <div class="canvas-wrapper" id="canvasWrapper">
    <div id="transformLayer">
      <svg id="gridSvg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path id="gridPath" d="M 40 0 L 0 0 0 40" fill="none" stroke="#ccc" stroke-width="1"/>
          </pattern>
        </defs>
        <rect x="-100000" y="-100000" width="200000" height="200000" fill="url(#gridPattern)"/>
      </svg>
      <svg id="connectionSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="nodeLayer"></div>
      <div id="labelLayer"></div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // ===================== CONFIG =====================
  const NODE_MIN_W = 180, NODE_MIN_H = 100;
  const DEF_NODE_W = 250, DEF_NODE_H = 130;
  const TITLE_H = 28, PORT_R = 7, PORT_SPACING = 24;
  const SHADOW_OFF = 8;
  const MAX_HISTORY = 50;
  const TARGET_LONG = 8192;

  // ===================== STATE =====================
  let nodes = [];
  let links = [];
  let strokes = [];
  let textLabels = [];
  let nextId = 1;
  let view = { x: 0, y: 0, scale: 1 };
  let history = [];
  let redoStack = [];
  let selectedNodeId = null;
  let selectedLinkId = null;
  let textFontSize = 16;
  let inverted = false;
  let drawingMode = false;
  let textMode = false;
  let historyEnabled = true;

  // Transient interaction state
  let dragNode = null, dragOffX = 0, dragOffY = 0;
  let resizeNode = null, resizeStart = {};
  let dragLabel = null, labelDragOff = {};
  let tempLink = null;
  let activeStroke = null;
  let isPanning = false;
  let panStart = null, viewStart = null;

  // DOM refs
  const transformLayer = document.getElementById('transformLayer');
  const nodeLayer = document.getElementById('nodeLayer');
  const labelLayer = document.getElementById('labelLayer');
  const connSvg = document.getElementById('connectionSvg');
  const canvasWrapper = document.getElementById('canvasWrapper');
  const gridPath = document.getElementById('gridPath');

  // ===================== COORDINATES =====================
  function screenToWorld(sx, sy) {
    return {
      x: (sx - view.x) / view.scale,
      y: (sy - view.y) / view.scale
    };
  }
  function worldToScreen(wx, wy) {
    return {
      x: wx * view.scale + view.x,
      y: wy * view.scale + view.y
    };
  }
  function updateTransform() {
    transformLayer.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
  }

  // ===================== PORT GEOMETRY =====================
  function getPortPos(node, portId) {
    const isIn = portId.includes('_in_');
    const idx = parseInt(portId.split('_').pop(), 10) || 0;
    const y = node.y + TITLE_H + 16 + idx * PORT_SPACING;
    const x = isIn ? node.x : node.x + node.width;
    return { x, y };
  }
  function getInputPortY(node, idx) {
    return node.y + TITLE_H + 16 + idx * PORT_SPACING;
  }
  function getOutputPortY(node, idx) {
    return node.y + TITLE_H + 16 + idx * PORT_SPACING;
  }

  // ===================== SELECTION HELPERS =====================
  function updateSelection() {
    nodes.forEach(n => {
      if (n.element) n.element.classList.toggle('selected', n.id === selectedNodeId);
    });
    textLabels.forEach(t => {
      if (t.element) t.element.classList.toggle('selected', t.id === selectedNodeId);
    });
  }
  function selectNode(id) {
    selectedNodeId = id;
    selectedLinkId = null;
    updateSelection();
    renderLinks();
  }
  function selectLabel(id) {
    selectedNodeId = id;
    selectedLinkId = null;
    updateSelection();
    renderLinks();
  }
  function selectLink(id) {
    selectedLinkId = id;
    selectedNodeId = null;
    updateSelection();
    renderLinks();
  }
  function deselectAll() {
    selectedNodeId = null;
    selectedLinkId = null;
    updateSelection();
    renderLinks();
  }

  // ===================== NODE CRUD =====================
  function createNodeData(x, y, title, text, w, h) {
    const id = nextId++;
    return {
      id, x, y, width: w || DEF_NODE_W, height: h || DEF_NODE_H,
      title: title || 'COMMAND',
      text: text || 'prompt idea...',
      inputs: [{ id: id+'_in_0', name: 'in', type: '*' }],
      outputs: [{ id: id+'_out_0', name: 'out', type: '*' }]
    };
  }

  function buildNodeElement(n) {
    const el = document.createElement('div');
    el.className = 'node' + (selectedNodeId === n.id ? ' selected' : '');
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    el.style.width = n.width + 'px';
    el.style.height = n.height + 'px';
    el.dataset.id = n.id;

    const title = document.createElement('div');
    title.className = 'node-title';
    title.textContent = '⣿ ' + n.title + ' ⣿';
    title.dataset.drag = 'true';

    const body = document.createElement('div');
    body.className = 'node-body';
    body.contentEditable = true;
    body.textContent = n.text;

    const del = document.createElement('div');
    del.className = 'delete-btn';
    del.textContent = '✕';
    del.dataset.delete = 'true';

    const resize = document.createElement('div');
    resize.className = 'resize-handle';
    resize.dataset.resize = 'true';

    el.appendChild(title);
    el.appendChild(body);
    el.appendChild(del);
    el.appendChild(resize);

    // Ports
    n.inputs.forEach((inp, i) => {
      const p = document.createElement('div');
      p.className = 'port input-port';
      p.dataset.portId = inp.id;
      p.style.top = (getInputPortY(n, i) - n.y - PORT_R) + 'px';
      const lbl = document.createElement('span');
      lbl.className = 'port-label input-label';
      lbl.textContent = inp.name;
      p.appendChild(lbl);
      el.appendChild(p);
    });
    n.outputs.forEach((out, i) => {
      const p = document.createElement('div');
      p.className = 'port output-port';
      p.dataset.portId = out.id;
      p.style.top = (getOutputPortY(n, i) - n.y - PORT_R) + 'px';
      const lbl = document.createElement('span');
      lbl.className = 'port-label output-label';
      lbl.textContent = out.name;
      p.appendChild(lbl);
      el.appendChild(p);
    });

    // Events
    title.addEventListener('mousedown', e => onNodeDragStart(e, n.id));
    del.addEventListener('click', e => { e.stopPropagation(); deleteNode(n.id); });
    resize.addEventListener('mousedown', e => onResizeStart(e, n.id));

    let oldText = n.text;
    body.addEventListener('focus', () => { oldText = n.text; });
    body.addEventListener('input', e => { n.text = e.target.innerText; });
    body.addEventListener('blur', () => { if (n.text !== oldText) pushHistory(); });

    body.addEventListener('focus', () => { selectNode(n.id); });
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.port') || e.target.dataset.resize || e.target.dataset.delete) return;
      selectNode(n.id);
    });

    // Port events
    el.querySelectorAll('.port').forEach(port => {
      port.addEventListener('mousedown', e => onPortMouseDown(e, n.id, port.dataset.portId));
    });

    return el;
  }

  function addNode(x, y, title, text) {
    const n = createNodeData(x, y, title, text);
    nodes.push(n);
    const el = buildNodeElement(n);
    nodeLayer.appendChild(el);
    n.element = el;
    pushHistory();
    renderLinks();
    return n;
  }
  function deleteNode(id) {
    const idx = nodes.findIndex(n => n.id === id);
    if (idx === -1) return;
    const hadSelectedLink = links.some(l => (l.fromNode === id || l.toNode === id) && l.id === selectedLinkId);
    links = links.filter(l => l.fromNode !== id && l.toNode !== id);
    nodes[idx].element.remove();
    nodes.splice(idx, 1);
    if (selectedNodeId === id) selectedNodeId = null;
    if (hadSelectedLink) selectedLinkId = null;
    pushHistory();
    renderLinks();
    updateSelection();
  }

  // ===================== LINK CRUD =====================
  function addLink(fromNode, fromOutput, toNode, toInput) {
    if (links.find(l => l.fromNode === fromNode && l.fromOutput === fromOutput && l.toNode === toNode && l.toInput === toInput)) return;
    links = links.filter(l => !(l.toNode === toNode && l.toInput === toInput));
    const id = nextId++;
    links.push({ id, fromNode, fromOutput, toNode, toInput });
    pushHistory();
    renderLinks();
  }
  function deleteLink(id) {
    const idx = links.findIndex(l => l.id === id);
    if (idx === -1) return;
    links.splice(idx, 1);
    if (selectedLinkId === id) selectedLinkId = null;
    pushHistory();
    renderLinks();
  }

  function bezierPath(x1, y1, x2, y2) {
    const dist = Math.max(50, Math.abs(x2 - x1) * 0.5);
    return `M ${x1} ${y1} C ${x1 + dist} ${y1}, ${x2 - dist} ${y2}, ${x2} ${y2}`;
  }

  function renderLinks() {
    connSvg.innerHTML = '';

    // Strokes
    strokes.forEach(stroke => {
      if (stroke.points.length < 2) return;
      const pts = stroke.points.map(p => `${p.x},${p.y}`).join(' ');
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      poly.setAttribute('points', pts);
      poly.setAttribute('class', 'stroke-polyline');
      connSvg.appendChild(poly);
    });

    // Permanent links
    links.forEach(link => {
      const a = nodes.find(n => n.id === link.fromNode);
      const b = nodes.find(n => n.id === link.toNode);
      if (!a || !b) return;
      const p1 = getPortPos(a, link.fromOutput);
      const p2 = getPortPos(b, link.toInput);
      const d = bezierPath(p1.x, p1.y, p2.x, p2.y);

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'link-group' + (selectedLinkId === link.id ? ' selected' : ''));
      g.dataset.linkId = link.id;

      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hit.setAttribute('d', d);
      hit.setAttribute('class', 'link-hit');

      const vis = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      vis.setAttribute('d', d);
      vis.setAttribute('class', 'link-visible');

      g.appendChild(hit);
      g.appendChild(vis);

      // Delete button at midpoint for selected
      if (selectedLinkId === link.id) {
        const mx = 0.125*p1.x + 0.375*(p1.x + Math.max(50, Math.abs(p2.x-p1.x)*0.5)) + 0.375*(p2.x - Math.max(50, Math.abs(p2.x-p1.x)*0.5)) + 0.125*p2.x;
        const my = 0.125*p1.y + 0.375*p1.y + 0.375*p2.y + 0.125*p2.y;
        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', mx);
        circ.setAttribute('cy', my);
        circ.setAttribute('r', 8);
        circ.setAttribute('class', 'link-delete-btn');
        circ.addEventListener('mousedown', e => { e.stopPropagation(); deleteLink(link.id); });
        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('x', mx);
        txt.setAttribute('y', my);
        txt.setAttribute('class', 'link-delete-icon');
        txt.textContent = '×';
        g.appendChild(circ);
        g.appendChild(txt);
      }

      g.addEventListener('mousedown', e => {
        if (e.target.classList && e.target.classList.contains('link-delete-btn')) return;
        e.stopPropagation();
        selectLink(link.id);
      });

      connSvg.appendChild(g);
    });

    // Temp link
    if (tempLink) {
      let x1, y1, x2, y2;
      if (tempLink.type === 'out') {
        const n = nodes.find(n => n.id === tempLink.fromNode);
        const p = getPortPos(n, tempLink.fromOutput);
        x1 = p.x; y1 = p.y; x2 = tempLink.x; y2 = tempLink.y;
      } else {
        const n = nodes.find(n => n.id === tempLink.toNode);
        const p = getPortPos(n, tempLink.toInput);
        x1 = tempLink.x; y1 = tempLink.y; x2 = p.x; y2 = p.y;
      }
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', bezierPath(x1, y1, x2, y2));
      path.setAttribute('class', 'temp-link');
      connSvg.appendChild(path);
    }
  }

  // ===================== INTERACTION: NODE DRAG =====================
  function onNodeDragStart(e, id) {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const n = nodes.find(n => n.id === id);
    if (!n) return;
    dragNode = n;
    const w = screenToWorld(e.clientX, e.clientY);
    dragOffX = w.x - n.x;
    dragOffY = w.y - n.y;
    selectNode(id);

    function move(ev) {
      if (!dragNode) return;
      const w2 = screenToWorld(ev.clientX, ev.clientY);
      dragNode.x = w2.x - dragOffX;
      dragNode.y = w2.y - dragOffY;
      dragNode.element.style.left = dragNode.x + 'px';
      dragNode.element.style.top = dragNode.y + 'px';
      updateNodePortPositions(dragNode);
      renderLinks();
    }
    function up() {
      if (dragNode) pushHistory();
      dragNode = null;
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }

  function updateNodePortPositions(n) {
    const ports = n.element.querySelectorAll('.port');
    ports.forEach(p => {
      const pid = p.dataset.portId;
      const isIn = pid.includes('_in_');
      const idx = parseInt(pid.split('_').pop(), 10) || 0;
      const y = (isIn ? getInputPortY(n, idx) : getOutputPortY(n, idx)) - n.y - PORT_R;
      p.style.top = y + 'px';
    });
  }

  // ===================== INTERACTION: RESIZE =====================
  function onResizeStart(e, id) {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const n = nodes.find(n => n.id === id);
    if (!n) return;
    resizeNode = n;
    const w = screenToWorld(e.clientX, e.clientY);
    resizeStart = { x: w.x, y: w.y, w: n.width, h: n.height };

    function move(ev) {
      if (!resizeNode) return;
      const w2 = screenToWorld(ev.clientX, ev.clientY);
      const dw = w2.x - resizeStart.x;
      const dh = w2.y - resizeStart.y;
      resizeNode.width = Math.max(NODE_MIN_W, resizeStart.w + dw);
      resizeNode.height = Math.max(NODE_MIN_H, resizeStart.h + dh);
      resizeNode.element.style.width = resizeNode.width + 'px';
      resizeNode.element.style.height = resizeNode.height + 'px';
      updateNodePortPositions(resizeNode);
      renderLinks();
    }
    function up() {
      if (resizeNode) pushHistory();
      resizeNode = null;
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }

  // ===================== INTERACTION: PORTS / LINKS =====================
  function onPortMouseDown(e, nodeId, portId) {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const isOut = portId.includes('_out_');
    const w = screenToWorld(e.clientX, e.clientY);

    if (isOut) {
      tempLink = { type: 'out', fromNode: nodeId, fromOutput: portId, x: w.x, y: w.y };
    } else {
      const existing = links.find(l => l.toNode === nodeId && l.toInput === portId);
      if (existing) {
        tempLink = { type: 'in', toNode: nodeId, toInput: portId, x: w.x, y: w.y };
        deleteLink(existing.id);
      } else {
        tempLink = { type: 'in', toNode: nodeId, toInput: portId, x: w.x, y: w.y };
      }
    }

    function move(ev) {
      if (!tempLink) return;
      const w2 = screenToWorld(ev.clientX, ev.clientY);
      tempLink.x = w2.x;
      tempLink.y = w2.y;
      renderLinks();
    }
    function up(ev) {
      if (!tempLink) return;
      const w2 = screenToWorld(ev.clientX, ev.clientY);
      const target = findPortAt(w2.x, w2.y, tempLink.type === 'out' ? 'in' : 'out');
      if (target) {
        if (tempLink.type === 'out') {
          addLink(tempLink.fromNode, tempLink.fromOutput, target.nodeId, target.portId);
        } else {
          addLink(target.nodeId, target.portId, tempLink.toNode, tempLink.toInput);
        }
      }
      tempLink = null;
      renderLinks();
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }

  function findPortAt(x, y, type) {
    const R2 = 144;
    for (const n of nodes) {
      const ports = type === 'in' ? n.inputs : n.outputs;
      for (const p of ports) {
        const pos = getPortPos(n, p.id);
        const dx = x - pos.x, dy = y - pos.y;
        if (dx*dx + dy*dy < R2) {
          return { nodeId: n.id, portId: p.id };
        }
      }
    }
    return null;
  }

  // ===================== TEXT LABELS =====================
  function createLabelData(x, y, text) {
    return { id: nextId++, x, y, text: text || 'annotation', width: 120, height: 40, fontSize: textFontSize };
  }
  function buildLabelElement(t) {
    const el = document.createElement('div');
    el.className = 'text-label' + (selectedNodeId === t.id ? ' selected' : '');
    el.style.left = t.x + 'px';
    el.style.top = t.y + 'px';
    el.style.fontSize = t.fontSize + 'px';
    el.dataset.labelId = t.id;

    const drag = document.createElement('div');
    drag.className = 'text-drag';
    drag.textContent = '⣿⣿';
    drag.dataset.textdrag = 'true';

    const body = document.createElement('div');
    body.className = 'text-content';
    body.contentEditable = true;
    body.textContent = t.text;

    const del = document.createElement('div');
    del.className = 'delete-btn';
    del.textContent = '✕';
    del.dataset.textdelete = 'true';

    el.appendChild(drag);
    el.appendChild(body);
    el.appendChild(del);

    let oldText = t.text;
    drag.addEventListener('mousedown', e => onLabelDragStart(e, t.id));
    del.addEventListener('click', e => { e.stopPropagation(); deleteLabel(t.id); });
    body.addEventListener('focus', () => { oldText = t.text; });
    body.addEventListener('input', e => { t.text = e.target.innerText; });
    body.addEventListener('blur', () => {
      t.width = el.offsetWidth;
      t.height = el.offsetHeight;
      if (t.text !== oldText) pushHistory();
    });
    body.addEventListener('focus', () => { selectLabel(t.id); });
    el.addEventListener('mousedown', e => {
      if (e.target.dataset.textdrag || e.target.dataset.textdelete) return;
      selectLabel(t.id);
    });

    return el;
  }
  function addLabel(x, y, text) {
    const t = createLabelData(x, y, text);
    textLabels.push(t);
    const el = buildLabelElement(t);
    labelLayer.appendChild(el);
    t.element = el;
    t.width = el.offsetWidth;
    t.height = el.offsetHeight;
    pushHistory();
    return t;
  }
  function deleteLabel(id) {
    const idx = textLabels.findIndex(t => t.id === id);
    if (idx === -1) return;
    textLabels[idx].element.remove();
    textLabels.splice(idx, 1);
    if (selectedNodeId === id) selectedNodeId = null;
    pushHistory();
    updateSelection();
  }
  function onLabelDragStart(e, id) {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const t = textLabels.find(t => t.id === id);
    if (!t) return;
    dragLabel = t;
    const w = screenToWorld(e.clientX, e.clientY);
    labelDragOff = { x: w.x - t.x, y: w.y - t.y };
    selectLabel(id);

    function move(ev) {
      if (!dragLabel) return;
      const w2 = screenToWorld(ev.clientX, ev.clientY);
      dragLabel.x = w2.x - labelDragOff.x;
      dragLabel.y = w2.y - labelDragOff.y;
      dragLabel.element.style.left = dragLabel.x + 'px';
      dragLabel.element.style.top = dragLabel.y + 'px';
    }
    function up() {
      if (dragLabel) {
        dragLabel.width = dragLabel.element.offsetWidth;
        dragLabel.height = dragLabel.element.offsetHeight;
        pushHistory();
      }
      dragLabel = null;
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }

  // ===================== DRAWING =====================
  function startStroke(x, y) {
    activeStroke = { points: [{ x, y }] };
    strokes.push(activeStroke);
    renderLinks();
  }
  function addStrokePoint(x, y) {
    if (!activeStroke) return;
    activeStroke.points.push({ x, y });
    renderLinks();
  }
  function endStroke() {
    if (activeStroke) {
      pushHistory();
      activeStroke = null;
    }
  }

  // ===================== ZOOM / PAN =====================
  canvasWrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const mouse = screenToWorld(e.clientX, e.clientY);
    view.x = e.clientX - mouse.x * view.scale * factor;
    view.y = e.clientY - mouse.y * view.scale * factor;
    view.scale = Math.max(0.1, Math.min(5, view.scale * factor));
    updateTransform();
  }, { passive: false });

  canvasWrapper.addEventListener('mousedown', e => {
    if (e.button === 1) {
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
      viewStart = { x: view.x, y: view.y };
      canvasWrapper.classList.add('panning');
      e.preventDefault();
    } else if (e.button === 0) {
      if (e.target.closest('.node') || e.target.closest('.text-label') || e.target.closest('.link-group')) return;
      const w = screenToWorld(e.clientX, e.clientY);
      if (drawingMode) {
        startStroke(w.x, w.y);
        function move(ev) {
          const w2 = screenToWorld(ev.clientX, ev.clientY);
          addStrokePoint(w2.x, w2.y);
        }
        function up() {
          endStroke();
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        }
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      } else if (textMode) {
        addLabel(w.x, w.y, 'text');
        textMode = false;
        updateModeUI();
      } else {
        deselectAll();
      }
    }
  });

  window.addEventListener('mousemove', e => {
    if (isPanning) {
      view.x = viewStart.x + (e.clientX - panStart.x);
      view.y = viewStart.y + (e.clientY - panStart.y);
      updateTransform();
    }
  });
  window.addEventListener('mouseup', () => {
    if (isPanning) {
      isPanning = false;
      canvasWrapper.classList.remove('panning');
    }
  });

  // ===================== HISTORY =====================
  function serializeState() {
    return {
      nodes: nodes.map(n => ({
        id: n.id, x: n.x, y: n.y, width: n.width, height: n.height,
        title: n.title, text: n.text,
        inputs: n.inputs.map(i => ({...i})),
        outputs: n.outputs.map(o => ({...o}))
      })),
      links: links.map(l => ({...l})),
      strokes: strokes.map(s => ({ points: s.points.map(p => ({...p})) })),
      textLabels: textLabels.map(t => ({
        id: t.id, x: t.x, y: t.y, text: t.text, width: t.width, height: t.height, fontSize: t.fontSize
      })),
      view: {...view},
      nextId,
      textFontSize,
      selectedNodeId,
      selectedLinkId
    };
  }
  function loadState(state) {
    nodeLayer.innerHTML = '';
    labelLayer.innerHTML = '';
    connSvg.innerHTML = '';

    nextId = state.nextId;
    view = {...state.view};
    textFontSize = state.textFontSize;
    selectedNodeId = state.selectedNodeId;
    selectedLinkId = state.selectedLinkId;
    updateTransform();
    document.getElementById('fontSizeInput').value = textFontSize;

    nodes = state.nodes.map(n => ({...n, element: null}));
    links = state.links.map(l => ({...l}));
    strokes = state.strokes.map(s => ({ points: s.points.map(p => ({...p})) }));
    textLabels = state.textLabels.map(t => ({...t, element: null}));

    nodes.forEach(n => {
      const el = buildNodeElement(n);
      nodeLayer.appendChild(el);
      n.element = el;
    });
    textLabels.forEach(t => {
      const el = buildLabelElement(t);
      labelLayer.appendChild(el);
      t.element = el;
    });
    renderLinks();
    updateSelection();
  }
  function pushHistory() {
    if (!historyEnabled) return;
    const state = JSON.parse(JSON.stringify(serializeState()));
    history.push(state);
    if (history.length > MAX_HISTORY) history.shift();
    redoStack = [];
  }
  function undo() {
    if (history.length === 0) return;
    const current = JSON.parse(JSON.stringify(serializeState()));
    redoStack.push(current);
    const prev = history.pop();
    loadState(prev);
  }
  function redo() {
    if (redoStack.length === 0) return;
    const current = JSON.parse(JSON.stringify(serializeState()));
    history.push(current);
    const next = redoStack.pop();
    loadState(next);
  }

  // ===================== EXPORT PNG =====================
  function wrapText(ctx, text, maxWidth) {
    const words = text.split(/(\s+)/).filter(w => w.length > 0);
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur + w;
      if (ctx.measureText(test).width > maxWidth && cur.length > 0) {
        lines.push(cur);
        cur = w;
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function escapeXml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function generateSVG() {
    if (nodes.length === 0 && links.length === 0 && strokes.length === 0 && textLabels.length === 0) return null;

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

    function expand(x, y) {
      minX = Math.min(minX, x);
      minY = Math.min(minY, y);
      maxX = Math.max(maxX, x);
      maxY = Math.max(maxY, y);
    }

    nodes.forEach(n => {
      expand(n.x - 10, n.y - 10);
      expand(n.x + n.width + SHADOW_OFF + 10, n.y + n.height + SHADOW_OFF + 10);
      n.inputs.forEach((inp, i) => {
        const p = getPortPos(n, inp.id);
        expand(p.x, p.y);
      });
      n.outputs.forEach((out, i) => {
        const p = getPortPos(n, out.id);
        expand(p.x, p.y);
      });
    });
    textLabels.forEach(t => {
      expand(t.x - 10, t.y - 10);
      expand(t.x + (t.width || 120) + SHADOW_OFF/2 + 10, t.y + (t.height || 40) + SHADOW_OFF/2 + 10);
    });
    strokes.forEach(s => s.points.forEach(p => expand(p.x, p.y)));
    links.forEach(l => {
      const a = nodes.find(n => n.id === l.fromNode);
      const b = nodes.find(n => n.id === l.toNode);
      if (a && b) {
        const p1 = getPortPos(a, l.fromOutput);
        const p2 = getPortPos(b, l.toInput);
        expand(p1.x, p1.y);
        expand(p2.x, p2.y);
        const dist = Math.max(50, Math.abs(p2.x - p1.x) * 0.5);
        expand(p1.x + dist, p1.y);
        expand(p2.x - dist, p2.y);
      }
    });

    const pad = 100;
    minX -= pad; minY -= pad;
    maxX += pad; maxY += pad;
    const W = maxX - minX;
    const H = maxY - minY;

    const mCanvas = document.createElement('canvas');
    const mCtx = mCanvas.getContext('2d');

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${W} ${H}" width="${W}" height="${H}">
`;
    svg += `<rect x="${minX}" y="${minY}" width="${W}" height="${H}" fill="#fff"/>
`;

    strokes.forEach(s => {
      if (s.points.length < 2) return;
      const pts = s.points.map(p => `${p.x},${p.y}`).join(' ');
      svg += `<polyline points="${pts}" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
`;
    });

    links.forEach(l => {
      const a = nodes.find(n => n.id === l.fromNode);
      const b = nodes.find(n => n.id === l.toNode);
      if (!a || !b) return;
      const p1 = getPortPos(a, l.fromOutput);
      const p2 = getPortPos(b, l.toInput);
      const dist = Math.max(50, Math.abs(p2.x - p1.x) * 0.5);
      svg += `<path d="M ${p1.x} ${p1.y} C ${p1.x + dist} ${p1.y}, ${p2.x - dist} ${p2.y}, ${p2.x} ${p2.y}" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
`;
    });

    textLabels.forEach(t => {
      const tw = t.width || 120;
      const th = t.height || 40;
      svg += `<rect x="${t.x + 4}" y="${t.y + 4}" width="${tw}" height="${th}" fill="#000"/>
`;
      svg += `<rect x="${t.x}" y="${t.y}" width="${tw}" height="${th}" fill="#fff" stroke="#000" stroke-width="2"/>
`;
      mCtx.font = `${t.fontSize}px Arial, sans-serif`;
      const lines = wrapText(mCtx, t.text, tw - 16);
      const lineH = t.fontSize * 1.3;
      let ty = t.y + 6 + t.fontSize;
      lines.forEach(line => {
        svg += `<text x="${t.x + 8}" y="${ty}" font-family="Arial, sans-serif" font-size="${t.fontSize}px" fill="#000">${escapeXml(line)}</text>
`;
        ty += lineH;
      });
    });

    nodes.forEach(n => {
      svg += `<rect x="${n.x + SHADOW_OFF}" y="${n.y + SHADOW_OFF}" width="${n.width}" height="${n.height}" fill="#000"/>
`;
      svg += `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" fill="#fff" stroke="#000" stroke-width="3"/>
`;
      svg += `<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${TITLE_H}" fill="#ddd" stroke="#000" stroke-width="2"/>
`;
      svg += `<text x="${n.x + 10}" y="${n.y + 20}" font-family="Courier New, monospace" font-size="14px" font-weight="bold" fill="#000">${escapeXml('⣿ ' + n.title + ' ⣿')}</text>
`;
      mCtx.font = "15px 'Courier New', monospace";
      const bodyLines = wrapText(mCtx, n.text, n.width - 16);
      const bodyLineH = 15 * 1.4;
      let by = n.y + TITLE_H + 10 + 15;
      bodyLines.forEach(line => {
        svg += `<text x="${n.x + 8}" y="${by}" font-family="Courier New, monospace" font-size="15px" fill="#000">${escapeXml(line)}</text>
`;
        by += bodyLineH;
      });
      n.inputs.forEach((inp, i) => {
        const p = getPortPos(n, inp.id);
        svg += `<circle cx="${p.x}" cy="${p.y}" r="${PORT_R}" fill="#fff" stroke="#000" stroke-width="2"/>
`;
        svg += `<text x="${p.x + 10}" y="${p.y + 4}" font-family="Arial, sans-serif" font-size="10px" font-weight="bold" fill="#000">${escapeXml(inp.name)}</text>
`;
      });
      n.outputs.forEach((out, i) => {
        const p = getPortPos(n, out.id);
        svg += `<circle cx="${p.x}" cy="${p.y}" r="${PORT_R}" fill="#fff" stroke="#000" stroke-width="2"/>
`;
        svg += `<text x="${p.x - 10}" y="${p.y + 4}" font-family="Arial, sans-serif" font-size="10px" font-weight="bold" text-anchor="end" fill="#000">${escapeXml(out.name)}</text>
`;
      });
    });

    svg += `</svg>`;
    return { svg, width: W, height: H };
  }

  async function exportPNG() {
    try {
      const result = generateSVG();
      if (!result) return alert('No content to export.');
      const { svg, width, height } = result;

      const scale = TARGET_LONG / Math.max(width, height);
      const cW = Math.round(width * scale);
      const cH = Math.round(height * scale);

      const canvas = document.createElement('canvas');
      canvas.width = cW;
      canvas.height = cH;
      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, cW, cH);

      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
      });
      ctx.drawImage(img, 0, 0, cW, cH);
      URL.revokeObjectURL(url);

      canvas.toBlob(b => {
        if (!b) return;
        const u = URL.createObjectURL(b);
        const a = document.createElement('a');
        a.href = u;
        a.download = 'colignum_8k.png';
        a.click();
        URL.revokeObjectURL(u);
      }, 'image/png');
    } catch (err) {
      alert('Export failed: ' + err.message);
    }
  }

  // ===================== UI HELPERS =====================
  function updateModeUI() {
    document.getElementById('drawBtn').classList.toggle('active', drawingMode);
    document.getElementById('textBtn').classList.toggle('active', textMode);
    canvasWrapper.classList.toggle('drawing-mode', drawingMode);
    canvasWrapper.classList.toggle('text-mode', textMode);
  }
  function setDrawingMode(v) {
    drawingMode = v;
    textMode = false;
    updateModeUI();
  }
  function setTextMode(v) {
    textMode = v;
    drawingMode = false;
    updateModeUI();
  }
  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  function invertUI() {
    inverted = !inverted;
    document.body.classList.toggle('inverted', inverted);
    gridPath.setAttribute('stroke', inverted ? '#333' : '#ccc');
    renderLinks();
  }

  // ===================== KEYBOARD =====================
  window.addEventListener('keydown', e => {
    if (e.target.isContentEditable) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        e.shiftKey ? redo() : undo();
      }
      return;
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selectedLinkId !== null) {
        deleteLink(selectedLinkId);
      } else if (selectedNodeId !== null) {
        const isLabel = textLabels.some(t => t.id === selectedNodeId);
        if (isLabel) deleteLabel(selectedNodeId);
        else deleteNode(selectedNodeId);
      }
    } else if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      e.shiftKey ? redo() : undo();
    }
  });

  // ===================== INIT =====================
  function init() {
    historyEnabled = false;
    const n1 = addNode(200, 200, 'COMMAND', 'concept: mystical forest\n#fantasy #moody');
    const n2 = addNode(520, 320, 'COMMAND', 'lighting: volumetric fog\ngolden hour');
    const n3 = addNode(840, 440, 'COMMAND', 'camera: 50mm\ncinematic depth');
    const n4 = addNode(1160, 560, 'COMMAND', 'details: floating particles\nbutterflies');
    addLink(n1.id, n1.outputs[0].id, n2.id, n2.inputs[0].id);
    addLink(n2.id, n2.outputs[0].id, n3.id, n3.inputs[0].id);
    addLink(n3.id, n3.outputs[0].id, n4.id, n4.inputs[0].id);
    addLabel(300, 550, 'warm light');
    addLabel(900, 300, 'depth effect');

    view.x = 50; view.y = 50; view.scale = 1;
    updateTransform();
    historyEnabled = true;
    pushHistory();
  }

  // Toolbar events
  document.getElementById('addNodeBtn').addEventListener('click', () => {
    const cx = canvasWrapper.clientWidth / 2;
    const cy = canvasWrapper.clientHeight / 2;
    const w = screenToWorld(cx, cy);
    addNode(w.x - 125, w.y - 65, 'COMMAND', 'new prompt...');
  });
  document.getElementById('exportPngBtn').addEventListener('click', exportPNG);
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
  document.getElementById('invertBtn').addEventListener('click', invertUI);
  document.getElementById('drawBtn').addEventListener('click', () => setDrawingMode(!drawingMode));
  document.getElementById('textBtn').addEventListener('click', () => setTextMode(!textMode));
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('redoBtn').addEventListener('click', redo);
  document.getElementById('fontSizeInput').addEventListener('input', e => {
    textFontSize = parseInt(e.target.value, 10) || 16;
    textLabels.forEach(t => {
      t.fontSize = textFontSize;
      if (t.element) t.element.style.fontSize = textFontSize + 'px';
    });
  });

  init();
})();
</script>
</body>
</html>
